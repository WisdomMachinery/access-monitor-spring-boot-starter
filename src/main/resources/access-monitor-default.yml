# ============================================================
# Access Monitor Spring Boot Starter 默认配置示例
# ============================================================
# 本文件展示了访问监控模块的所有可配置项及其默认值。
# 实际使用时，请将这些配置复制到你的 application.yml 中，
# 并根据实际业务需求进行调整。
# ============================================================

access:
  monitor:
    # ---------------- 全局开关 ----------------
    # 整个访问监控模块的总开关。设置为 false 将完全关闭所有监控和限流逻辑。
    enabled: true

    # ---------------- 速率限制配置 ----------------
    # 控制单个IP或账户在单位时间内的最大请求次数，超限自动封禁。
    rate-limit:
      # 速率限制功能的独立开关
      enabled: true
      # 每个Key在1分钟时间窗口内允许的最大请求次数。第21次请求将触发封禁。
      max-requests-per-minute: 20
      # 触发速率限制后的封禁时长。封禁期间该Key的所有请求直接返回429。
      ban-duration: 10m
      # 限流统计维度：IP（按IP限流）、ACCOUNT（按账户限流）、BOTH（优先账户，无账户时回退IP）
      mode: IP
      # 白名单列表。列入其中的IP或账户不受速率限制约束。
      whitelist:
        - "127.0.0.1"      # 本地回环地址
        - "::1"            # IPv6 本地回环地址
      # 黑名单列表。列入其中的IP或账户将被无条件拒绝访问。
      blacklist: []

    # ---------------- 请求队列配置 ----------------
    # 对同一Key的并发请求进行排队管理，防止瞬时高并发直接压垮服务。
    queue:
      # 请求队列功能的独立开关
      enabled: true
      # 每个Key对应的最大排队长度。当并发数已满且队列已满时，新请求被拒绝。
      max-queue-size-per-key: 100
      # 每个Key允许的最大并发处理数。超出的请求进入队列等待。
      max-concurrent-per-key: 10
      # 请求在队列中的最长等待时间。超时后请求被移除并返回503。
      queue-timeout: 30s

    # ---------------- 流量整形配置 ----------------
    # 采用令牌桶算法对全系统的请求速率进行全局控制和平滑。
    traffic-shaper:
      # 流量整形功能的独立开关
      enabled: true
      # 令牌桶每秒产生的令牌数，即系统的平均处理速率上限。
      global-rate-per-second: 1000
      # 令牌桶的容量上限，即系统允许的最大突发流量。
      burst-capacity: 2000
      # 优先路径列表。匹配到的请求将绕过令牌桶直接放行。
      # 配置时使用路径前缀匹配。
      prioritized-paths:
        - "/health"              # 健康检查接口
        - "/actuator/health"     # Actuator 健康端点
        - "/favicon.ico"         # 浏览器图标请求

    # ---------------- 慢请求检测配置 ----------------
    # 识别并处理响应时间异常或已挂死的请求，支持自动中断。
    slow-request:
      # 慢请求检测功能的独立开关
      enabled: true
      # 慢请求判定阈值。处理时间超过此值将输出WARN日志。
      threshold: 10s
      # 挂死请求判定阈值。处理时间超过此值将输出ERROR日志。
      hang-threshold: 60s
      # 是否自动中断挂死请求的处理线程（协作式中断）。
      auto-interrupt: true

    # ---------------- 连接数限制配置 ----------------
    # 控制单IP和全局的并发连接数，自动清理空闲僵尸连接。
    connection-limit:
      # 连接数限制功能的独立开关
      enabled: true
      # 单个IP地址允许的最大并发连接数。NAT环境下不宜设置过低。
      max-connections-per-ip: 50
      # 系统全局允许的最大并发连接数。建议不超过文件描述符上限的80%。
      global-max-connections: 10000
      # 连接的空闲超时时间。超过此时间未活动的连接将被从内部计数器中移除。
      idle-timeout: 5m
